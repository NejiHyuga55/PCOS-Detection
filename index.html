<!DOCTYPE html>
<html>
<head>
<title>PCOS Detection System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(120deg,#eef2ff,#e0f2fe,#fdf2f8);
font-family: 'Segoe UI', sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.app-card{
background:white;
padding:35px;
border-radius:18px;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
width:450px;
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h2{
font-weight:700;
}

.header i{
font-size:40px;
color:#6366f1;
margin-bottom:10px;
}

.form-control{
padding:12px;
border-radius:10px;
margin-bottom:15px;
}

.btn-predict{
background:#6366f1;
border:none;
padding:12px;
width:100%;
border-radius:10px;
font-weight:600;
font-size:16px;
transition:0.3s;
}

.btn-predict:hover{
background:#4f46e5;
}

.result-box{
margin-top:20px;
padding:15px;
border-radius:10px;
background:#f1f5f9;
text-align:center;
font-size:18px;
font-weight:600;
}

.footer{
text-align:center;
margin-top:15px;
font-size:13px;
color:#6b7280;
}

</style>

</head>

<body>

<div class="app-card">

<div class="header">
<i class="fa-solid fa-heart-pulse"></i>
<h2>PCOS Detection</h2>
<p class="text-muted">AI Powered Health Prediction</p>
</div>

<form action="/predict" method="post">

<input type="number" class="form-control" name="age" placeholder="Age" required>

<input type="number" step="0.1" class="form-control" name="bmi" placeholder="BMI" required>

<input type="number" class="form-control" name="cycle" placeholder="Cycle Length (days)" required>

<button class="btn btn-predict" type="submit">
<i class="fa-solid fa-stethoscope"></i> Predict
</button>

</form>

<div class="result-box">
{{ prediction }}
</div>

<div class="footer">
AI Assisted Screening Tool
</div>

</div>

</body>
</html>
